
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  .wrap{padding:1rem 0;font-family:var(--font-sans);}
  .top-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .metric-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;}
  .metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:2px;}
  .metric-val{font-size:22px;font-weight:500;color:var(--color-text-primary);}
  .metric-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:1px;}
  .phase-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .phase-pill{padding:5px 12px;border-radius:12px;font-size:12px;font-weight:500;opacity:.35;transition:opacity .3s;}
  .phase-pill.active{opacity:1;}
  .log-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;font-size:12px;color:var(--color-text-secondary);min-height:56px;line-height:1.8;margin-bottom:12px;font-family:var(--font-mono);}
  .log-box .hi{color:var(--color-text-primary);font-weight:500;}
  .log-box .good{color:#0F6E56;}
  .log-box .bad{color:#A32D2D;}
  canvas{width:100%;height:140px;display:block;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);margin-bottom:12px;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  .ctrl-btn{padding:7px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;font-size:13px;cursor:pointer;color:var(--color-text-primary);}
  .ctrl-btn:hover{background:var(--color-background-secondary);}
  .ctrl-btn.go{background:#E1F5EE;border-color:#0F6E56;color:#085041;}
  .ctrl-btn:disabled{opacity:.4;cursor:default;}
  .speed-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:var(--color-text-secondary);}
  .speed-row input{flex:1;}
</style>

<div class="wrap">
<h2 class="sr-only">Neural network training loop simulation</h2>

<div class="top-row">
  <div class="metric-card">
    <div class="metric-label">Loss (wrongness score)</div>
    <div class="metric-val" id="loss-val">—</div>
    <div class="metric-sub" id="loss-sub">lower = better</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Accuracy</div>
    <div class="metric-val" id="acc-val">—</div>
    <div class="metric-sub" id="acc-sub">higher = better</div>
  </div>
</div>

<div class="phase-row">
  <span class="phase-pill" id="ph0" style="background:#E6F1FB;color:#0C447C;">1 Forward pass</span>
  <span class="phase-pill" id="ph1" style="background:#FAEEDA;color:#633806;">2 Measure loss</span>
  <span class="phase-pill" id="ph2" style="background:#FAECE7;color:#712B13;">3 Backpropagation</span>
  <span class="phase-pill" id="ph3" style="background:#E1F5EE;color:#085041;">4 Update weights</span>
</div>

<div class="log-box" id="log-box">Press "Train one step" to run one iteration, or "Auto-train" to watch it learn!</div>

<canvas id="loss-chart"></canvas>

<div class="speed-row">
  <span>Speed</span>
  <input type="range" min="50" max="800" step="50" value="300" id="speed-slider">
  <span id="speed-lbl">300ms/step</span>
</div>

<div class="btn-row">
  <button class="ctrl-btn go" id="step-btn" onclick="doStep()">Train one step</button>
  <button class="ctrl-btn" id="auto-btn" onclick="toggleAuto()">Auto-train</button>
  <button class="ctrl-btn" onclick="resetSim()">Reset</button>
</div>
</div>

<script>
let step = 0;
let losses = [];
let accs = [];
let autoTimer = null;
let isAuto = false;
const maxSteps = 60;

const phases = [
  {id:'ph0', text: (l,a,s) => `<span class="hi">Step ${s}: Forward pass</span> — feeding input through all layers. Network makes a prediction.`},
  {id:'ph1', text: (l,a,s) => `<span class="hi">Loss = ${l.toFixed(3)}</span> — comparing prediction to true label. ${l > 0.5 ? '<span class="bad">Still quite wrong.</span>' : l > 0.2 ? 'Getting closer.' : '<span class="good">Getting very accurate!</span>'}`},
  {id:'ph2', text: (l,a,s) => `<span class="hi">Backprop</span> — tracing error backwards through every layer. Each weight gets a blame score (gradient).`},
  {id:'ph3', text: (l,a,s) => `<span class="hi">Weights updated.</span> Every weight nudged slightly in the direction that reduces loss. Accuracy: <span class="good">${Math.round(a*100)}%</span>.`},
];

function lossAt(t) {
  const base = 1.8 * Math.exp(-0.065 * t);
  const noise = (Math.random() - 0.5) * 0.08;
  return Math.max(0.04, base + noise);
}
function accAt(l) {
  return Math.min(0.99, Math.max(0.1, 1 - l * 0.75 + (Math.random()-0.5)*0.04));
}

function setPhase(i) {
  [0,1,2,3].forEach(j => document.getElementById('ph'+j).classList.toggle('active', j===i));
}

function doStep() {
  if (step >= maxSteps) return;
  step++;
  const loss = lossAt(step);
  const acc  = accAt(loss);
  losses.push(loss);
  accs.push(acc);

  const phaseIdx = (step - 1) % 4;
  setPhase(phaseIdx);

  document.getElementById('log-box').innerHTML = phases[phaseIdx].text(loss, acc, step);
  document.getElementById('loss-val').textContent = loss.toFixed(3);
  document.getElementById('acc-val').textContent = Math.round(acc*100) + '%';

  const lossColor = loss > 0.6 ? '#E24B4A' : loss > 0.25 ? '#BA7517' : '#1D9E75';
  document.getElementById('loss-val').style.color = lossColor;
  document.getElementById('acc-val').style.color = acc > 0.85 ? '#0F6E56' : acc > 0.6 ? '#854F0B' : '#A32D2D';
  document.getElementById('loss-sub').textContent = loss < 0.1 ? 'excellent!' : loss < 0.3 ? 'good progress' : 'still learning...';
  document.getElementById('acc-sub').textContent = acc > 0.9 ? 'great accuracy!' : acc > 0.7 ? 'improving fast' : 'early training';

  drawChart();

  if (step >= maxSteps) {
    document.getElementById('log-box').innerHTML = '<span class="good hi">Training complete!</span> The network has converged. Weights have settled into values that minimise loss. Features are now fully learned.';
    setPhase(-1);
    stopAuto();
    document.getElementById('step-btn').disabled = true;
    document.getElementById('auto-btn').disabled = true;
  }
}

function drawChart() {
  const canvas = document.getElementById('loss-chart');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.getBoundingClientRect().width;
  const H = 140;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,W,H);

  const pad = {t:12, b:24, l:36, r:12};
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;
  const cs = getComputedStyle(document.documentElement);
  const textCol = cs.getPropertyValue('--color-text-tertiary').trim() || '#aaa';
  const gridCol = cs.getPropertyValue('--color-border-tertiary').trim() || '#e0e0e0';

  ctx.strokeStyle = gridCol; ctx.lineWidth = 0.5;
  [0, 0.5, 1.0, 1.5].forEach(v => {
    const y = pad.t + ph - (v/1.8)*ph;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+pw, y); ctx.stroke();
    ctx.fillStyle = textCol; ctx.font = '10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(v.toFixed(1), pad.l-4, y+3);
  });
  ctx.fillStyle = textCol; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Loss over training steps', pad.l + pw/2, H-4);

  if (losses.length < 2) return;
  ctx.strokeStyle = '#E24B4A'; ctx.lineWidth = 2; ctx.lineJoin='round';
  ctx.beginPath();
  losses.forEach((l, i) => {
    const x = pad.l + (i/(maxSteps-1))*pw;
    const y = pad.t + ph - Math.min(1, l/1.8)*ph;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();

  if (losses.length > 1) {
    ctx.strokeStyle = '#1D9E75'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
    ctx.beginPath();
    accs.forEach((a, i) => {
      const x = pad.l + (i/(maxSteps-1))*pw;
      const y = pad.t + ph - a*ph;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle='#E24B4A'; ctx.font='10px sans-serif'; ctx.textAlign='left';
    ctx.fillText('Loss', pad.l+pw-48, pad.t+12);
    ctx.fillStyle='#1D9E75';
    ctx.fillText('Accuracy', pad.l+pw-48, pad.t+24);
  }
}

function toggleAuto() {
  if (isAuto) { stopAuto(); } else { startAuto(); }
}
function startAuto() {
  isAuto = true;
  document.getElementById('auto-btn').textContent = 'Pause';
  document.getElementById('auto-btn').style.background = '#FAEEDA';
  const spd = +document.getElementById('speed-slider').value;
  autoTimer = setInterval(() => { if (step < maxSteps) doStep(); else stopAuto(); }, spd);
}
function stopAuto() {
  isAuto = false;
  clearInterval(autoTimer);
  document.getElementById('auto-btn').textContent = 'Auto-train';
  document.getElementById('auto-btn').style.background = '';
}
function resetSim() {
  stopAuto();
  step = 0; losses = []; accs = [];
  [0,1,2,3].forEach(j => document.getElementById('ph'+j).classList.remove('active'));
  document.getElementById('log-box').innerHTML = 'Press "Train one step" to run one iteration, or "Auto-train" to watch it learn!';
  document.getElementById('loss-val').textContent = '—';
  document.getElementById('acc-val').textContent = '—';
  document.getElementById('loss-val').style.color = '';
  document.getElementById('acc-val').style.color = '';
  document.getElementById('loss-sub').textContent = 'lower = better';
  document.getElementById('acc-sub').textContent = 'higher = better';
  document.getElementById('step-btn').disabled = false;
  document.getElementById('auto-btn').disabled = false;
  const canvas = document.getElementById('loss-chart');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}
document.getElementById('speed-slider').oninput = function() {
  document.getElementById('speed-lbl').textContent = this.value+'ms/step';
  if (isAuto) { stopAuto(); startAuto(); }
};
</script>
