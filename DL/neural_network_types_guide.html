def sigmoid(x): return 1 / (1 + np.exp(-x))

# XOR problem: tiny FNN with 1 hidden layer
X = np.array([[0,0],[0,1],[1,0],[1,1]])
y = np.array([[0],[1],[1],[0]])

np.random.seed(42)
W1 = np.random.randn(2, 4) * 0.5   # 2 inputs → 4 hidden
W2 = np.random.randn(4, 1) * 0.5   # 4 hidden → 1 output

for epoch in range(5000):

    h = sigmoid(X @ W1)             # hidden activations
    out = sigmoid(h @ W2)           # output

    # Backprop
    err = y - out
    d_out = err * sigmoid_d(out)    # output delta
    d_h   = (d_out @ W2.T) * sigmoid_d(h)  # hidden delta

    W2 += h.T @ d_out * 0.1
    W1 += X.T @ d_h   * 0.1

def relu(x): return np.maximum(0, x)

def convolve2d(img, kernel):
    """Manual 2D convolution (no padding)"""
    kh, kw = kernel.shape
    oh, ow = img.shape[0]-kh+1, img.shape[1]-kw+1
    out = np.zeros((oh, ow))
    for i in range(oh):
        for j in range(ow):
            out[i,j] = (img[i:i+kh, j:j+kw] * kernel).sum()
    return out

def maxpool2x2(x):
    h, w = x.shape[0]//2, x.shape[1]//2

    for i in range(h):
        for j in range(w):
            out[i,j] = x[2*i:2*i+2, 2*j:2*j+2].max()

def tanh(x): return np.tanh(x)
def tanh_d(x): return 1 - x**2

class SimpleRNN:
    def __init__(self, input_size, hidden_size, output_size):
        self.Wx = np.random.randn(input_size, hidden_size)  * 0.1
        self.Wh = np.random.randn(hidden_size, hidden_size) * 0.1
        self.Wy = np.random.randn(hidden_size, output_size) * 0.1
        self.bh = np.zeros((1, hidden_size))
        self.by = np.zeros((1, output_size))

    def forward(self, inputs):
        """inputs: list of vectors, one per time step"""
        h = np.zeros((1, self.Wh.shape[0]))
        self.hs = [h]      # store all hidden states
        self.xs = inputs

        outputs = []
        for x in inputs:
            x = x.reshape(1, -1)
            # Key equation: new hidden = tanh(input + previous hidden)
            h = tanh(x @ self.Wx + h @ self.Wh + self.bh)
            y = h @ self.Wy + self.by
            self.hs.append(h)
            outputs.append(y)
        return outputs, h

# Toy example: predict next number in sequence

    code: `import numpy as np

def sigmoid(x): return 1 / (1 + np.exp(-x))

class LSTMCell:
    def __init__(self, input_sz, hidden_sz):
        n = input_sz + hidden_sz
        # All 4 gates in one weight matrix (efficient!)
        self.W = np.random.randn(n, 4 * hidden_sz) * 0.1
        self.b = np.zeros(4 * hidden_sz)
        self.h_sz = hidden_sz

    def forward(self, x, h_prev, c_prev):
        # Concatenate input + previous hidden
        combined = np.concatenate([x, h_prev])

        # All gate pre-activations at once
        gates = combined @ self.W + self.b

        n = self.h_sz
        f = sigmoid(gates[0:n])      # forget gate — what to erase
        i = sigmoid(gates[n:2*n])    # input gate  — what to write
        g = np.tanh(gates[2*n:3*n])  # cell gate   — candidate values
        o = sigmoid(gates[3*n:4*n])  # output gate — what to expose

        c = f * c_prev + i * g       # update cell state
        h = o * np.tanh(c)           # compute hidden state

        return h, c, {"f":f,"i":i,"g":g,"o":o}

# Run a small LSTM over a sequence

c = np.zeros(5)

          f"input={gates['i'].mean():.2f}  h_norm={np.linalg.norm(h):.2f}")`

def relu(x): return np.maximum(0, x)
def relu_d(x): return (x > 0).astype(float)
def mse(y, yhat): return np.mean((y - yhat)**2)

class Autoencoder:
    def __init__(self):
        # 4 → 2 → 4  (compress then reconstruct)
        self.W1 = np.random.randn(4, 2) * 0.5   # encoder
        self.W2 = np.random.randn(2, 4) * 0.5   # decoder

    def forward(self, x):
        self.x   = x
        self.enc = relu(x @ self.W1)   # compressed code
        self.out = relu(self.enc @ self.W2)  # reconstruction
        return self.enc, self.out

    def backward(self, lr=0.01):
        err  = self.out - self.x                      # reconstruction error
        d2   = err * relu_d(self.out)                 # decoder delta
        d1   = (d2 @ self.W2.T) * relu_d(self.enc)   # encoder delta

        self.W2 -= self.enc.T @ d2 * lr
        self.W1 -= self.x.T   @ d1 * lr

class HopfieldNetwork:
    def __init__(self, n):
        self.n = n
        self.W = np.zeros((n, n))

    def train(self, patterns):
        """Hebbian rule: neurons that fire together, wire together"""
        for p in patterns:
            p = p.reshape(-1, 1)
            self.W += p @ p.T
        np.fill_diagonal(self.W, 0)     # no self-connections
        self.W /= len(patterns)

    def recall(self, noisy, steps=10):
        """Async update until energy stops decreasing"""
        state = noisy.copy()
        for _ in range(steps):
            for i in np.random.permutation(self.n):
                net_input = self.W[i] @ state
                state[i]  = 1 if net_input >= 0 else -1
        return state

    def energy(self, state):
        return -0.5 * state @ self.W @ state

# Store 2 patterns (use ±1, not 0/1)
patterns = [
    np.array([ 1, 1,-1,-1, 1]),
    np.array([-1, 1, 1,-1,-1]),
]
hn = HopfieldNetwork(n=5)

recalled = hn.recall(noisy)

print("Recalled:", recalled)       # [ 1  1 -1 -1  1]  ← restored!`

class SOM:
    def __init__(self, rows, cols, input_dim):
        self.shape = (rows, cols)
        # Each neuron has a weight vector same size as input
        self.weights = np.random.rand(rows, cols, input_dim)

    def _bmu(self, x):
        """Best Matching Unit — neuron closest to input x"""
        dists = np.linalg.norm(self.weights - x, axis=2)
        return np.unravel_index(dists.argmin(), self.shape)

    def _neighbor_strength(self, bmu, i, j, radius):
        """Gaussian neighborhood function"""
        d2 = (bmu[0]-i)**2 + (bmu[1]-j)**2
        return np.exp(-d2 / (2 * radius**2))

    def train(self, data, epochs=200, lr0=0.5, radius0=2.0):
        for epoch in range(epochs):
            lr     = lr0 * np.exp(-epoch / epochs)
            radius = max(radius0 * np.exp(-epoch / epochs), 0.5)

            for x in data:
                bmu = self._bmu(x)
                for i in range(self.shape[0]):
                    for j in range(self.shape[1]):
                        nb = self._neighbor_strength(bmu, i, j, radius)
                        # Pull neuron weights toward input
                        self.weights[i,j] += lr * nb * (x - self.weights[i,j])

    def map_data(self, data):
        return [self._bmu(x) for x in data]

# Cluster 2D points into a 4x4 map

data = np.vstack([

    np.random.randn(20, 2) + [-2, -2], # cluster B
])
som.train(data, epochs=300)
mapped = som.map_data(data)
print("First 5 BMUs:", mapped[:5])`
